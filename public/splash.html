<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Updating...</title>
		<style>
			/* Styling for the splash screen */
			body {
				margin: 0;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				background-color: rgb(99, 102, 241);
				font-family: Arial, sans-serif;
				color: white;
				text-align: center;
			}
			#container {
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			img {
				width: 100px;
				height: 100px;
				margin-bottom: 20px;
			}
			h1 {
				font-size: 24px;
				margin: 0;
			}
			p {
				font-size: 18px;
				margin: 10px 0 0 0;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<img src="logo.jpg" alt="App Logo" />
			<h1 id="message">Checking for updates...</h1>
			<p>Please wait...</p>
		</div>

		<script>
			const { ipcRenderer } = require("electron");

			// Listen for the "update-ready" message
			ipcRenderer.on("update-ready", () => {
				document.getElementById("message").innerText =
					"Update downloaded. Restarting to install...";
			});
		</script>
	</body>
</html>
